<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warung Yosssturee — Payment</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f6f8fc 0%, #edf2f9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* Elemen dekoratif halus */
        body::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0,200,180,0.05) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .payment-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0, 10, 30, 0.12), 0 10px 30px rgba(0,0,0,0.05);
            max-width: 1000px;
            width: 100%;
            padding: 2.8rem 2.5rem;
            z-index: 10;
            transition: all 0.3s ease;
        }

        /* header */
        .store-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2.4rem;
            padding-bottom: 1.8rem;
            border-bottom: 2px dashed rgba(0,40,80,0.1);
        }
        .store-icon {
            background: #1a2e3f;
            color: white;
            width: 58px;
            height: 58px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 14px rgba(0,20,40,0.2);
        }
        .store-name {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1a2e3f, #2c4058);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .store-id {
            font-size: 0.9rem;
            background: #e9edf4;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            color: #2f4858;
            font-weight: 500;
            margin-left: 1rem;
        }

        /* grid metode */
        .payment-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 1.5rem 0 2rem 0;
        }

        .method-card {
            background: white;
            border-radius: 32px;
            padding: 1.8rem 1.5rem 1.8rem 1.5rem;
            box-shadow: 0 10px 25px -8px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.7);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .method-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 35px -12px rgba(0,30,60,0.2);
        }

        .method-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 1.8rem;
        }
        .method-title i {
            font-size: 2rem;
            background: #f0f4fa;
            padding: 10px;
            border-radius: 18px;
        }
        .qris-title i { color: #0066b3; background: #e3f0ff; }
        .dana-title i { color: #008b7e; background: #e0f5f2; }

        /* QRIS area */
        .qris-image {
            text-align: center;
            margin: 0.5rem 0 1.2rem;
        }
        .qris-image img {
            max-width: 220px;
            width: 100%;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 15px 30px -8px rgba(0,0,0,0.2);
            border: 3px solid white;
            background: white;
            padding: 0.5rem;
        }
        .qris-ref {
            background: #f4f9ff;
            padding: 0.6rem 1rem;
            border-radius: 60px;
            font-size: 0.95rem;
            color: #004a8f;
            font-weight: 500;
            display: inline-block;
            margin-top: 0.2rem;
        }

        /* dana info */
        .dana-detail {
            background: #f3fbf9;
            border-radius: 28px;
            padding: 1.5rem 1.2rem;
            border: 1px solid #d0f0ea;
            margin: 1rem 0 0.5rem;
        }
        .dana-phone {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 1.4rem;
            font-weight: 600;
            color: #096b5e;
            background: white;
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            border: 1px solid #c0e6df;
        }
        .dana-phone i {
            color: #00a68c;
            font-size: 1.8rem;
        }
        .dana-phone span {
            letter-spacing: 1px;
            word-break: break-all;
        }
        .copy-btn {
            background: none;
            border: none;
            color: #0a8b7a;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 30px;
            transition: 0.2s;
        }
        .copy-btn:hover {
            background: #defff5;
        }

        /* catatan kaki transfer — teks sesuai permintaan */
        .transfer-note {
            grid-column: span 2;
            text-align: center;
            margin-top: 0.8rem;
            margin-bottom: 1.4rem;
            background: rgba(0,0,0,0.02);
            padding: 0.8rem;
            border-radius: 200px;
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            color: #b85c00;
            border: 1px dashed #ffb27f;
            background: #fff7e8;
        }
        .transfer-note i {
            margin: 0 8px;
            color: #e07c2c;
        }
        .transfer-note span {
            background: #ffdec2;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            display: inline-block;
            margin: 0 4px;
        }

        /* footer instruksi */
        .instruction {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            justify-content: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(0,0,0,0.05);
            color: #3a4f63;
            font-weight: 400;
        }
        .instruction-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #edf3f9;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.95rem;
        }
        .instruction-item i {
            color: #2d6e9c;
        }

        /* Responsif */
        @media (max-width: 700px) {
            .payment-card { padding: 2rem 1.2rem; }
            .payment-methods { grid-template-columns: 1fr; gap: 1.2rem; }
            .transfer-note { grid-column: span 1; }
            .store-name { font-size: 1.6rem; }
            .dana-phone { font-size: 1.1rem; flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <!-- header warung -->
        <div class="store-header">
            <div class="store-icon">
                <i class="fas fa-mug-hot"></i>
            </div>
            <div>
                <span class="store-name">Warung Yosssturee</span>
                <span class="store-id">Wk33764</span>
            </div>
        </div>

        <!-- dua metode pembayaran besar -->
        <div class="payment-methods">
            <!-- QRIS card -->
            <div class="method-card">
                <div class="method-title qris-title">
                    <i class="fas fa-qrcode"></i> 
                    <span>QRIS</span>
                </div>
                <div class="qris-image">
                    <!-- QRIS dari gambar yang dikirim: gunakan file IMG_20260314_182827.jpg -->
                    <img src="IMG_20260314_182827.jpg" alt="QRIS Warung Yosssturee" onerror="this.onerror=null; this.src='https://via.placeholder.com/300x300?text=QRIS+Preview';">
                </div>
                <div style="text-align: center;">
                    <span class="qris-ref"><i class="fas fa-credit-card"></i> semua aplikasi pembayaran</span>
                </div>
                <p style="text-align: center; margin-top: 1.2rem; color: #445e77; font-size: 0.95rem; background: #ecf5ff; padding: 0.4rem; border-radius: 20px;">
                    <i class="fas fa-camera"></i> Scan untuk bayar
                </p>
            </div>

            <!-- DANA card -->
            <div class="method-card">
                <div class="method-title dana-title">
                    <i class="fas fa-wallet"></i>
                    <span>DANA</span>
                </div>
                <div class="dana-detail">
                    <p style="margin-bottom: 12px; font-weight: 500; color: #0a5c51;"><i class="fas fa-phone-alt"></i>  Nomor DANA aktif</p>
                    <div class="dana-phone">
                        <i class="fas fa-user-circle"></i>
                        <span id="danaNumber">085649333764</span>
                        <button class="copy-btn" onclick="copyDana()" title="Salin nomor DANA"><i class="far fa-copy"></i></button>
                    </div>
                    <p style="margin-top: 1rem; font-size: 0.9rem; color: #207569; background: #daf2ed; padding: 0.5rem; border-radius: 30px; text-align: center;">
                        <i class="fas fa-check-circle"></i> a.n Yosssturee / Warung
                    </p>
                </div>
                <!-- tambahan catatan kecil -->
                <div style="margin-top: 1.2rem; font-size: 0.85rem; background: #f9f9fb; border-radius: 30px; padding: 0.5rem; color: #4d6079; border: 1px solid #eaeef3; text-align: center;">
                    <i class="far fa-clock"></i> konfirmasi otomatis 1x24 jam
                </div>
            </div>

            <!-- TEKS PENTING: ss bkti tf woe 🤬  (sesuai permintaan) -->
            <div class="transfer-note">
                <i class="fas fa-camera-retro"></i> 
                <span>ss bkti tf woe 🤬</span> 
                <i class="fas fa-exclamation-triangle" style="color:#c45d00;"></i>
            </div>
        </div>

        <!-- footer instruksi singkat -->
        <div class="instruction">
            <div class="instruction-item"><i class="fas fa-check-circle" style="color:#2a9d8f;"></i> Scan QRIS / transfer DANA</div>
            <div class="instruction-item"><i class="fas fa-image"></i> Screenshot bukti</div>
            <div class="instruction-item"><i class="fas fa-share"></i> Kirim ke admin via WA/telegram</div>
        </div>

        <!-- watermark kecil -->
        <div style="text-align: right; margin-top: 1.2rem; opacity: 0.5; font-size: 0.7rem; color: #2b3f53;">
            <i class="far fa-credit-card"></i> Yosssturee payment · wk33764
        </div>
    </div>

    <script>
        // fungsi copy nomor DANA ke clipboard
        function copyDana() {
            const danaText = document.getElementById('danaNumber').innerText;
            navigator.clipboard.writeText(danaText).then(() => {
                // notifikasi sederhana (tanpa alert berat)
                const btn = document.querySelector('.copy-btn i');
                const originalClass = btn.className;
                btn.className = 'fas fa-check';
                setTimeout(() => {
                    btn.className = originalClass;
                }, 1500);

                // tooltip / feedback elegan (opsional)
                const oldTitle = document.querySelector('.copy-btn').title;
                document.querySelector('.copy-btn').title = 'Tersalin!';
                setTimeout(() => {
                    document.querySelector('.copy-btn').title = oldTitle;
                }, 1500);
            }).catch(err => {
                alert('Gagal menyalin, silakan salin manual: 085649333764');
            });
        }

        // tambahan fallback untuk QRIS jika gambar tidak ditemukan (misal path beda)
        // gambar sudah sesuai nama: "IMG_20260314_182827.jpg" di folder yang sama
        // jika ingin ganti, sesuaikan src pada img
    </script>

    <!-- optional supaya copy button lebih terasa -->
</body>
  </html>
